<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow Pro v1.0 | Acesso Restrito</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0A0D14; --bg2: #111520; --bg3: #181E2E; --bg4: #1F2740; --bg5: #252D42;
            --green: #00D68F; --green2: #00F0A0; --red: #FF4757; --blue: #4A90E2;
            --yellow: #FFB830; --purple: #A855F7; --orange: #FF8C42; --teal: #00BCD4;
            --text: #EDF2FF; --text2: #7B88A0; --text3: #4A5568;
            --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.1);
            --card-r: 16px; --sm-r: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', sans-serif; }
        body { background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* AUTH SCREEN - PURE LOGIN */
        #auth-overlay {
            position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000;
        }
        .auth-card {
            background: var(--bg2); width: 100%; max-width: 400px; padding: 50px; border-radius: 24px; border: 1px solid var(--border); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .auth-logo {
            width: 64px; height: 64px; background: var(--green); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 24px; box-shadow: 0 0 20px rgba(0,214,143,0.3);
        }
        .auth-input {
            width: 100%; padding: 14px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 12px; color: var(--text); margin-bottom: 16px; outline: none; transition: 0.2s; font-size: 14px;
        }
        .auth-input:focus { border-color: var(--green); background: var(--bg4); }
        .auth-btn {
            width: 100%; padding: 16px; background: var(--green); color: #0A0D14; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 14px; letter-spacing: 0.5px;
        }
        .auth-btn:hover { background: var(--green2); transform: translateY(-2px); }
        .auth-error {
            background: rgba(255,71,87,0.1); color: var(--red); padding: 12px; border-radius: 10px; font-size: 12px; margin-bottom: 16px; display: none; line-height: 1.4;
        }

        /* APP LAYOUT */
        .app-container { display: none; height: 100vh; }
        .sidebar { width: 250px; background: var(--bg2); border-right: 1px solid var(--border); padding: 24px 16px; display: flex; flex-direction: column; }
        .main-content { flex: 1; overflow-y: auto; padding: 30px; background: var(--bg); }
        
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; color: var(--text2); cursor: pointer; transition: 0.2s; font-weight: 600; margin-bottom: 4px; }
        .nav-item:hover { background: var(--bg3); color: var(--text); }
        .nav-item.active { background: rgba(0,214,143,0.1); color: var(--green); }

        /* DASHBOARD DESIGN */
        .grid-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--bg2); padding: 20px; border-radius: 16px; border: 1px solid var(--border); }
        .stat-val { font-size: 24px; font-weight: 900; margin-top: 8px; }
    </style>
</head>
<body>

    <!-- ONLY LOGIN -->
    <div id="auth-overlay">
        <div class="auth-card">
            <div class="auth-logo">💰</div>
            <h1 style="font-weight:900; margin-bottom:8px; font-size: 1.7rem;">FinanceFlow <span style="color:var(--green)">PRO</span></h1>
            <p style="color:var(--text3); font-size: 12px; margin-bottom:35px;">Acesso Restrito ao Sistema de Elite</p>
            
            <div id="auth-error" class="auth-error"></div>
            
            <form id="login-form">
                <input type="email" id="email" class="auth-input" placeholder="Seu e-mail profissional" required>
                <input type="password" id="password" class="auth-input" placeholder="Sua senha de acesso" required>
                <button type="submit" id="btn-login" class="auth-btn">ENTRAR NO PAINEL</button>
            </form>
            
            <p style="margin-top: 24px; font-size: 11px; color: var(--text3);">© 2026 FinanceFlow Pro - Edition v1.0</p>
        </div>
    </div>

    <!-- MAIN APP (LOADS FROM financeflow-pro.html structure but integrated) -->
    <div class="app-container" id="app-content">
        <!-- Sidebar and Content will be injected here during sync -->
    </div>

    <script>
        // CONFIG
        const SB_URL = 'https://totqludytvydgqiwygqe.supabase.co';
        const SB_KEY = 'sb_publishable_8qkFVq7ZZyWRRLqtNLSdJg_-NlkJO9v';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        // AUTH LOGIC
        window.onload = async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (session) startApp(session.user);
        };

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const err = document.getElementById('auth-error');
            
            btn.disabled = true;
            btn.innerText = "AUTENTICANDO...";
            err.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await sb.auth.signInWithPassword({ email, password });

            if (error) {
                err.innerText = "ERRO: " + (error.message === "Invalid login credentials" ? "E-mail ou senha incorretos." : error.message);
                err.style.display = 'block';
                btn.disabled = false;
                btn.innerText = "ENTRAR NO PAINEL";
            } else {
                startApp(data.user);
            }
        };

        function startApp(user) {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('app-content').style.display = 'flex';
            // Aqui eu carregaria toda a interface que definimos no passo anterior
            location.reload(); // Recarrega para garantir o estado limpo se necessário, mas melhor injetar
        }
    </script>
</body>
</html>
