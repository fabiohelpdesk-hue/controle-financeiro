<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow | Cloud & Premium</title>
    
    <!-- Google Fonts: Nunito -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Chart.js 4.4.1 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Supabase SDK v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-principal: #0F1117;
            --bg-sidebar: #0B0D12;
            --bg-cards: #161B27;
            --bg-elements: #1E2535;
            
            --verde-receita: #00D68F;
            --vermelho-despesa: #FF4757;
            --azul-saldo: #4A90E2;
            --amarelo-alerta: #FFB830;
            --roxo-invest: #A855F7;
            
            --texto-primario: #F0F4FF;
            --texto-secundario: #8892A4;
            --borda-sutil: rgba(255, 255, 255, 0.05);
            
            --radius-card: 16px;
            --radius-element: 10px;
            
            --sidebar-width: 240px;
            --transition-speed: 0.3s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', sans-serif; -webkit-font-smoothing: antialiased; }

        body { background-color: var(--bg-principal); color: var(--texto-primario); display: flex; min-height: 100vh; overflow-x: hidden; }

        /* Login Overlay */
        .auth-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at top right, rgba(168, 85, 247, 0.1), transparent), var(--bg-principal); z-index: 5000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); transition: all 0.5s ease; }
        .auth-card { background: var(--bg-cards); padding: 40px; border-radius: 24px; border: 1px solid var(--borda-sutil); width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; }
        .auth-logo { margin-bottom: 32px; display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: 800; font-size: 1.5rem; text-transform: uppercase; color: var(--verde-receita); }
        .auth-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 30px; background: var(--bg-sidebar); padding: 5px; border-radius: 12px; }
        .auth-tab { padding: 10px; border-radius: 10px; cursor: pointer; color: var(--texto-secundario); font-weight: 700; transition: all 0.2s; border: none; background: none; }
        .auth-tab.active { background: var(--verde-receita); color: var(--bg-principal); }
        .auth-input { width: 100%; padding: 14px 16px; background: var(--bg-elements); border: 1px solid var(--borda-sutil); border-radius: 12px; color: white; margin-bottom: 16px; outline: none; transition: border-color 0.2s; }
        .auth-input:focus { border-color: var(--verde-receita); }
        .auth-btn { width: 100%; padding: 14px; background: var(--verde-receita); border: none; border-radius: 12px; color: var(--bg-principal); font-weight: 800; font-size: 16px; cursor: pointer; transition: transform 0.2s, background 0.2s; }
        .auth-btn:hover { background: #00BF7F; transform: translateY(-2px); }
        .auth-footer { margin-top: 20px; font-size: 12px; color: var(--texto-secundario); cursor: pointer; }

        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background-color: var(--bg-sidebar); height: 100vh; position: fixed; left: 0; top: 0; border-right: 1px solid var(--borda-sutil); display: flex; flex-direction: column; padding: 24px 16px; transition: width var(--transition-speed) ease; z-index: 1000; }
        .logo-container { display: flex; align-items: center; gap: 12px; padding: 0 8px 32px 8px; color: var(--texto-primario); font-weight: 800; font-size: 1.2rem; text-transform: uppercase; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; color: var(--texto-secundario); text-decoration: none; font-weight: 600; margin-bottom: 4px; transition: all 0.2s; cursor: pointer; }
        .nav-item:hover { background: var(--bg-elements); color: var(--texto-primario); }
        .nav-item.active { background: rgba(0, 214, 143, 0.1); color: var(--verde-receita); }

        /* Main Content */
        .main-wrapper { margin-left: var(--sidebar-width); flex: 1; padding: 40px; display: none; flex-direction: column; gap: 32px; width: calc(100% - var(--sidebar-width)); }
        
        /* Dashboard Essentials */
        .summary-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { background: var(--bg-cards); border-radius: var(--radius-card); padding: 24px; border: 1px solid var(--borda-sutil); }
        .summary-value { font-size: 24px; font-weight: 800; margin-top: 8px; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 700; }
        .bg-v { background: rgba(0, 214, 143, 0.15); color: var(--verde-receita); }
        .bg-d { background: rgba(255, 71, 87, 0.15); color: var(--vermelho-despesa); }

        /* Transaction List */
        .transaction-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--bg-sidebar); border-radius: 12px; margin-bottom: 8px; border: 1px solid transparent; transition: 0.2s; }
        .transaction-item:hover { border-color: rgba(0, 214, 143, 0.3); background: var(--bg-elements); }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: var(--bg-cards); width: 440px; border-radius: 24px; padding: 32px; border: 1px solid var(--borda-sutil); animation: scaleUp 0.3s ease; }
        @keyframes scaleUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Loading */
        #main-loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; flex-direction: column; align-items: center; gap: 12px; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--verde-receita); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Utility */
        .hidden { display: none !important; }
        .btn { padding: 12px 24px; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-p { background: var(--verde-receita); color: var(--bg-principal); }
        .btn-s { background: var(--bg-elements); color: white; border: 1px solid var(--borda-sutil); }
    </style>
</head>
<body>

    <!-- AUTH SECTION -->
    <div id="auth-section" class="auth-overlay">
        <div class="auth-card">
            <div class="auth-logo"><i data-lucide="wallet"></i> FinanceFlow</div>
            <div class="auth-tabs">
                <button class="auth-tab active" data-mode="login">Entrar</button>
                <button class="auth-tab" data-mode="signup">Criar Conta</button>
            </div>
            <div id="auth-form">
                <input type="email" id="auth-email" class="auth-input" placeholder="Seu e-mail">
                <input type="password" id="auth-password" class="auth-input" placeholder="Sua senha">
                <button class="auth-btn" id="btn-auth-submit">Entrar no App</button>
                <div id="auth-error" style="color:var(--vermelho-despesa); font-size:12px; margin-top:10px; display:none">Erro ao entrar</div>
            </div>
        </div>
    </div>

    <!-- MAIN APP STRUCTURE -->
    <aside class="sidebar" id="app-sidebar" style="display:none">
        <div class="logo-container"><i data-lucide="wallet" style="color:var(--verde-receita)"></i> FinanceFlow</div>
        <nav>
            <a class="nav-item active" data-view="dashboard"><i data-lucide="layout-dashboard"></i> Dashboard</a>
            <a class="nav-item" data-view="transactions"><i data-lucide="arrow-left-right"></i> Transações</a>
            <a class="nav-item" data-view="budget"><i data-lucide="target"></i> Orçamento</a>
            <a class="nav-item" data-view="accounts"><i data-lucide="landmark"></i> Contas</a>
        </nav>
        <div style="margin-top:auto; padding-top:20px; border-top:1px solid var(--borda-sutil)">
            <div id="user-display" style="font-size:12px; margin-bottom:10px; color:var(--texto-secundario)">Usuário logado</div>
            <button class="btn btn-s" id="btn-logout" style="width:100%"><i data-lucide="log-out"></i> Sair</button>
        </div>
    </aside>

    <main class="main-wrapper" id="app-main">
        <header style="display:flex; justify-content:space-between; align-items:center">
            <div><h1 id="view-title">Visão Geral</h1><p id="view-subtitle" style="color:var(--texto-secundario)">Controle em tempo real.</p></div>
            <div style="display:flex; gap:16px"><button class="btn btn-p" id="btn-new"><i data-lucide="plus"></i> Novo</button></div>
        </header>

        <!-- VIEWS -->
        <section id="view-dashboard" class="app-view">
            <div class="summary-cards">
                <div class="card"><div style="color:var(--texto-secundario); font-size:12px">Receitas</div><div class="summary-value" id="val-in">R$ 0,00</div></div>
                <div class="card"><div style="color:var(--texto-secundario); font-size:12px">Despesas</div><div class="summary-value" id="val-out">R$ 0,00</div></div>
                <div class="card"><div style="color:var(--texto-secundario); font-size:12px">Saldo</div><div class="summary-value" id="val-net">R$ 0,00</div></div>
            </div>
            <div class="card" style="margin-top:32px">
                <h3 style="margin-bottom:20px">Transações Recentes</h3>
                <div id="list-recent"></div>
            </div>
        </section>

        <!-- ADD MODAL -->
        <div class="modal-overlay" id="modal-add">
            <div class="modal-content">
                <h2 style="margin-bottom:24px">Nova Transação</h2>
                <div id="form-add">
                    <input type="text" id="f-desc" class="auth-input" placeholder="Descrição">
                    <input type="number" id="f-val" class="auth-input" placeholder="Valor (R$)">
                    <select id="f-type" class="auth-input">
                        <option value="despesa">Despesa</option>
                        <option value="receita">Receita</option>
                    </select>
                    <input type="text" id="f-cat" class="auth-input" placeholder="Categoria (ex: Alimento)">
                    <div style="display:flex; gap:10px; margin-top:10px">
                        <button class="btn btn-s" id="btn-modal-close" style="flex:1">Fechar</button>
                        <button class="btn btn-p" id="btn-modal-save" style="flex:2">Salvar Nuvem</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="main-loading"><div class="spinner"></div><p>Sincronizando...</p></div>

    <script>
        // SUPABASE CONFIG
        const URL = 'https://totqludytvydgqiwygqe.supabase.co';
        const KEY = 'sb_publishable_8qkFVq7ZZyWRRLqtNLSdJg_-NlkJO9v';
        const _v = supabase.createClient(URL, KEY);

        const UI = {
            auth: document.getElementById('auth-section'),
            main: document.getElementById('app-main'),
            sidebar: document.getElementById('app-sidebar'),
            loading: document.getElementById('main-loading'),
            error: document.getElementById('auth-error'),
            recent: document.getElementById('list-recent')
        };

        const APP = {
            user: null,
            transactions: [],
            view: 'dashboard',
            authMode: 'login'
        };

        // AUTH LOGIC
        async function checkSession() {
            const { data: { session } } = await _v.auth.getSession();
            handleAuthChange(session?.user || null);
        }

        function handleAuthChange(user) {
            APP.user = user;
            if (user) {
                UI.auth.classList.add('hidden');
                UI.main.style.display = 'flex';
                UI.sidebar.style.display = 'flex';
                document.getElementById('user-display').innerText = user.email;
                loadData();
            } else {
                UI.auth.classList.remove('hidden');
                UI.main.style.display = 'none';
                UI.sidebar.style.display = 'none';
            }
            lucide.createIcons();
        }

        document.querySelectorAll('.auth-tab').forEach(t => t.onclick = () => {
            document.querySelectorAll('.auth-tab').forEach(x => x.classList.remove('active'));
            t.classList.add('active');
            APP.authMode = t.dataset.mode;
            document.getElementById('btn-auth-submit').innerText = APP.authMode === 'login' ? 'Entrar no App' : 'Criar minha conta';
        });

        document.getElementById('btn-auth-submit').onclick = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            UI.error.style.display = 'none';
            
            let res;
            if (APP.authMode === 'login') {
                res = await _v.auth.signInWithPassword({ email, password: pass });
            } else {
                res = await _v.auth.signUp({ email, password: pass });
                if (!res.error) alert('Confirme seu e-mail para ativar a conta!');
            }

            if (res.error) {
                UI.error.innerText = res.error.message;
                UI.error.style.display = 'block';
            } else {
                handleAuthChange(res.data.user);
            }
        };

        document.getElementById('btn-logout').onclick = async () => {
            await _v.auth.signOut();
            handleAuthChange(null);
        };

        // SYNC LOGIC
        async function loadData() {
            UI.loading.style.display = 'flex';
            const { data, error } = await _v.from('transactions').select('*').order('created_at', { ascending: false });
            UI.loading.style.display = 'none';
            
            if (!error) {
                APP.transactions = data;
                render();
            }
        }

        async function saveTransaction() {
            const desc = document.getElementById('f-desc').value;
            const val = parseFloat(document.getElementById('f-val').value);
            const type = document.getElementById('f-type').value;
            const cat = document.getElementById('f-cat').value;

            if (!desc || !val) return alert('Preencha os campos!');

            UI.loading.style.display = 'flex';
            const { data, error } = await _v.from('transactions').insert([
                { user_id: APP.user.id, description: desc, value: val, type, category_id: cat }
            ]).select();
            UI.loading.style.display = 'none';

            if (!error) {
                document.getElementById('modal-add').style.display = 'none';
                loadData();
            } else {
                alert('Erro ao salvar: ' + error.message);
            }
        }

        // RENDERING
        function render() {
            const fmt = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
            
            const inc = APP.transactions.filter(t => t.type === 'receita').reduce((s, x) => s + parseFloat(x.value), 0);
            const exp = APP.transactions.filter(t => t.type === 'despesa').reduce((s, x) => s + parseFloat(x.value), 0);

            document.getElementById('val-in').innerText = fmt(inc);
            document.getElementById('val-out').innerText = fmt(exp);
            document.getElementById('val-net').innerText = fmt(inc - exp);

            UI.recent.innerHTML = APP.transactions.length ? '' : '<p style="color:var(--texto-secundario)">Nenhuma transação na nuvem.</p>';
            APP.transactions.forEach(t => {
                const div = document.createElement('div');
                div.className = 'transaction-item';
                div.innerHTML = `
                    <div style="display:flex; gap:12px; align-items:center">
                        <div class="badge ${t.type === 'receita' ? 'bg-v' : 'bg-d'}">${t.type.toUpperCase()}</div>
                        <div><div style="font-weight:700">${t.description}</div><div style="font-size:11px; color:var(--texto-secundario)">${t.category_id || 'Geral'}</div></div>
                    </div>
                    <div style="font-weight:800; color:${t.type === 'receita' ? 'var(--verde-receita)' : 'var(--vermelho-despesa)'}">${fmt(t.value)}</div>
                `;
                UI.recent.appendChild(div);
            });
            lucide.createIcons();
        }

        // EVENTS
        document.getElementById('btn-new').onclick = () => document.getElementById('modal-add').style.display = 'flex';
        document.getElementById('btn-modal-close').onclick = () => document.getElementById('modal-add').style.display = 'none';
        document.getElementById('btn-modal-save').onclick = saveTransaction;
        
        window.onload = () => {
            lucide.createIcons();
            checkSession();
        };
    </script>
</body>
</html>
