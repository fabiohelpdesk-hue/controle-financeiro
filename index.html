<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow Pro v1.0 | Elite Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0A0D14; --bg2: #111520; --bg3: #181E2E; --bg4: #1F2740; --bg5: #252D42;
            --green: #00D68F; --green2: #00F0A0; --red: #FF4757; --blue: #4A90E2;
            --yellow: #FFB830; --purple: #A855F7; --orange: #FF8C42; --teal: #00BCD4;
            --text: #EDF2FF; --text2: #7B88A0; --text3: #4A5568;
            --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.1);
            --card-r: 16px; --sm-r: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', sans-serif; }
        body { background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* AUTH SCREEN - PURE LOGIN */
        #auth-overlay {
            position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000;
        }
        .auth-card {
            background: var(--bg2); width: 100%; max-width: 400px; padding: 50px; border-radius: 24px; border: 1px solid var(--border); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .auth-logo { width: 64px; height: 64px; background: var(--green); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 24px; }
        .auth-input { width: 100%; padding: 14px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 12px; color: var(--text); margin-bottom: 16px; outline: none; transition: 0.2s; font-size: 14px; }
        .auth-input:focus { border-color: var(--green); }
        .auth-btn { width: 100%; padding: 16px; background: var(--green); color: #0A0D14; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .auth-btn:hover { background: var(--green2); transform: translateY(-2px); }
        .auth-error { background: rgba(255,71,87,0.1); color: var(--red); padding: 12px; border-radius: 10px; font-size: 12px; margin-bottom: 16px; display: none; }

        /* ── LAYOUT PRO ── */
        .app{ display:none; min-height:100vh; }
        .sidebar{width:248px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:22px 14px;position:fixed;height:100vh;z-index:20;overflow-y:auto;flex-shrink:0;}
        .main{margin-left:248px;flex:1;padding:28px;background:var(--bg);min-height:100vh;}

        .logo{display:flex;align-items:center;gap:10px;padding:0 8px 24px;border-bottom:1px solid var(--border);margin-bottom:6px;}
        .logo-icon{width:38px;height:38px;background:var(--green);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
        .logo-text{font-size:18px;font-weight:900;letter-spacing:-.3px;}
        .logo-text span{color:var(--green);}
        
        .nav-sec{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;padding:0 10px;margin:16px 0 5px;}
        .ni{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:var(--sm-r);cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);transition:all .18s;margin-bottom:2px;}
        .ni:hover{background:var(--bg3);color:var(--text);}
        .ni.active{background:rgba(0,214,143,0.13);color:var(--green);}
        
        .page{display:none;animation:fadeIn .2s ease;}
        .page.active{display:block;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

        .card{background:var(--bg2);border-radius:var(--card-r);padding:20px;border:1px solid var(--border);}
        .sg{display:grid;gap:12px;margin-bottom:18px;grid-template-columns:repeat(4,1fr);}
        .sc{background:var(--bg2);border-radius:14px;padding:18px;border:1px solid var(--border);position:relative;overflow:hidden;}
        .sc-val{font-size:22px;font-weight:900;margin-bottom:5px;letter-spacing:-.5px;}

        /* MODAL */
        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9000;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(5px);}
        .modal-overlay.open{display:flex;}
        .modal{background:var(--bg2);border-radius:20px;padding:28px;width:480px;max-width:100%;border:1px solid var(--border2);}

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- LOGIN RESTRICTED -->
    <div id="auth-overlay">
        <div class="auth-card">
            <div class="auth-logo">💰</div>
            <h1 style="font-weight:900; margin-bottom:8px; font-size: 1.7rem;">FinanceFlow <span style="color:var(--green)">PRO</span></h1>
            <p style="color:var(--text3); font-size: 12px; margin-bottom:35px;">Acesso Restrito ao Sistema de Elite</p>
            <div id="auth-error" class="auth-error"></div>
            <form id="login-form">
                <input type="email" id="email" class="auth-input" placeholder="Seu e-mail profissional" required>
                <input type="password" id="password" class="auth-input" placeholder="Sua senha de acesso" required>
                <button type="submit" id="btn-login" class="auth-btn">ENTRAR NO PAINEL</button>
            </form>
        </div>
    </div>

    <!-- MAIN APP APP -->
    <div class="app" id="app-content">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">💰</div>
                <div class="logo-text">Finance<span>Flow</span></div>
            </div>
            <nav>
                <div class="nav-sec">Principal</div>
                <div class="ni active" onclick="nav('dashboard')">📊<span>Dashboard</span></div>
                <div class="ni" onclick="nav('despesas')">📋<span>Despesas</span></div>
                <div class="ni" onclick="nav('entradas')">💚<span>Entradas</span></div>
                <div class="nav-sec">Config</div>
                <div class="ni" id="btn-logout" style="color:var(--red)">🚪<span>Sair</span></div>
            </nav>
        </aside>

        <main class="main">
            <div class="page active" id="page-dashboard">
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px">
                    <div><h1 style="font-size:22px; font-weight:900">Dashboard de Elite</h1><p id="user-info" style="color:var(--text2); font-size:12px"></p></div>
                    <button class="auth-btn" style="width:auto; padding:10px 20px" onclick="openModal('expense')">＋ Lançar</button>
                </div>
                
                <div class="sg">
                    <div class="sc"><div style="color:var(--text3); font-size:10px">ENTRADAS</div><div class="sc-val" id="d-in" style="color:var(--green)">R$ 0,00</div></div>
                    <div class="sc"><div style="color:var(--text3); font-size:10px">DESPESAS</div><div class="sc-val" id="d-out" style="color:var(--red)">R$ 0,00</div></div>
                    <div class="sc"><div style="color:var(--text3); font-size:10px">SALDO TOTAL</div><div class="sc-val" id="d-total" style="color:var(--blue)">R$ 0,00</div></div>
                    <div class="sc"><div style="color:var(--text3); font-size:10px">RESULTADO</div><div class="sc-val" id="d-res">R$ 0,00</div></div>
                </div>

                <div class="card"><div style="font-weight:800; margin-bottom:15px">Transações Recentes</div><div id="trans-list"></div></div>
            </div>
            
            <div class="page" id="page-despesas"><h1>Despesas</h1><div id="exp-list"></div></div>
            <div class="page" id="page-entradas"><h1>Entradas</h1><div id="inc-list"></div></div>
        </main>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2 id="modal-title" style="margin-bottom:20px">Novo Lançamento</h2>
            <div id="modal-body"></div>
            <div style="display:flex; gap:10px; margin-top:20px">
                <button class="auth-btn" style="background:var(--bg3); color:white" onclick="closeModal()">Cancelar</button>
                <button class="auth-btn" id="btn-save" onclick="saveData()">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://totqludytvydgqiwygqe.supabase.co';
        const SB_KEY = 'sb_publishable_8qkFVq7ZZyWRRLqtNLSdJg_-NlkJO9v';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        const S = { user: null, transactions: [] };
        const fmt = v => 'R$ ' + parseFloat(v||0).toLocaleString('pt-BR', {minimumFractionDigits:2});

        window.onload = async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (session) startApp(session.user);
        };

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');
            btn.innerText = "CARREGANDO...";
            btn.disabled = true;

            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            if (error) {
                const err = document.getElementById('auth-error');
                err.innerText = "Erro: " + error.message;
                err.style.display = 'block';
                btn.innerText = "ENTRAR NO PAINEL"; btn.disabled = false;
            } else { startApp(data.user); }
        };

        async function startApp(user) {
            S.user = user;
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('app-content').style.display = 'flex';
            document.getElementById('user-info').innerText = "Bem-vindo, " + user.email;
            await sync();
        }

        async function sync() {
            const { data } = await sb.from('transactions').select('*');
            S.transactions = data || [];
            renderDash();
        }

        function renderDash() {
            const ins = S.transactions.filter(t => t.type === 'receita').reduce((s,t) => s + parseFloat(t.value), 0);
            const outs = S.transactions.filter(t => t.type === 'despesa').reduce((s,t) => s + parseFloat(t.value), 0);
            document.getElementById('d-in').innerText = fmt(ins);
            document.getElementById('d-out').innerText = fmt(outs);
            document.getElementById('d-total').innerText = fmt(ins - outs);
            document.getElementById('d-res').innerText = fmt(ins - outs);
        }

        function nav(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.ni').forEach(n => n.classList.remove('active'));
            document.getElementById('page-'+page).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        document.getElementById('btn-logout').onclick = async () => {
            await sb.auth.signOut();
            location.reload();
        };

        function openModal(type) { 
            document.getElementById('modal').classList.add('open');
            document.getElementById('modal-body').innerHTML = `
                <input class="auth-input" id="f-desc" placeholder="Descrição">
                <input class="auth-input" id="f-val" type="number" placeholder="0,00">
                <select class="auth-input" id="f-type">
                    <option value="despesa">Despesa</option>
                    <option value="receita">Receita</option>
                </select>
            `;
        }
        function closeModal() { document.getElementById('modal').classList.remove('open'); }
        async function saveData() {
            const d = document.getElementById('f-desc').value;
            const v = document.getElementById('f-val').value;
            const t = document.getElementById('f-type').value;
            await sb.from('transactions').insert({ description: d, value: v, type: t, user_id: S.user.id });
            closeModal(); await sync();
        }
    </script>
</body>
</html>
