<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow v2.2 | Private </title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-principal: #0F1117;
            --bg-sidebar: #0B0D12;
            --bg-cards: #161B27;
            --bg-elements: #1E2535;
            --verde: #00D68F;
            --vermelho: #FF4757;
            --texto: #F0F4FF;
            --texto-dim: #8892A4;
            --borda: rgba(255, 255, 255, 0.05);
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', sans-serif; }
        body { background-color: var(--bg-principal); color: var(--texto); display: flex; min-height: 100vh; overflow: hidden; }

        /* Login Screen - Ultra Visible Error */
        .auth-overlay { position: fixed; inset: 0; background: var(--bg-principal); z-index: 5000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .auth-card { background: var(--bg-cards); padding: 50px 40px; border-radius: 24px; border: 1px solid var(--borda); width: 420px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        .auth-logo { margin-bottom: 24px; display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: 800; font-size: 1.8rem; color: var(--verde); }
        .auth-input { width: 100%; padding: 14px 16px; background: var(--bg-elements); border: 1px solid var(--borda); border-radius: 12px; color: white; margin-bottom: 16px; outline: none; font-size: 14px; }
        .auth-input:focus { border-color: var(--verde); }
        .auth-btn { width: 100%; padding: 16px; background: var(--verde); border: none; border-radius: 12px; color: var(--bg-principal); font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .auth-btn:disabled { opacity: 0.5; filter: grayscale(1); cursor: wait; }
        
        /* O Erro agora é gigante e chamativo */
        #auth-error-box { background: rgba(255, 71, 87, 0.15); border: 1px solid var(--vermelho); color: var(--vermelho); padding: 15px; border-radius: 12px; margin-top: 20px; font-size: 14px; font-weight: 700; display: none; text-align: left; }

        .sidebar { width: 240px; background: var(--bg-sidebar); height: 100vh; position: fixed; border-right: 1px solid var(--borda); display: flex; flex-direction: column; padding: 24px; z-index: 1000; }
        .main-wrapper { margin-left: 240px; flex: 1; padding: 40px; display: none; flex-direction: column; gap: 32px; width: calc(100% - 240px); overflow-y: auto; }
        
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; color: var(--texto-dim); cursor: pointer; font-weight: 600; margin-bottom: 5px; }
        .nav-item.active { background: rgba(0, 214, 143, 0.1); color: var(--verde); }
        .card { background: var(--bg-cards); border-radius: var(--radius); padding: 24px; border: 1px solid var(--borda); }
        .summary-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .summary-value { font-size: 24px; font-weight: 800; margin-top: 8px; }
        .transaction-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--bg-sidebar); border-radius: 12px; margin-bottom: 8px; }
        
        .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--verde); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; margin: 10px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .btn { padding: 12px 24px; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .btn-p { background: var(--verde); color: var(--bg-principal); }
        .btn-s { background: var(--bg-elements); color: white; border: 1px solid var(--borda); }
    </style>
</head>
<body>

    <div id="auth-section" class="auth-overlay">
        <div class="auth-card">
            <div class="auth-logo"><i data-lucide="shield-check"></i> FinanceFlow</div>
            <p style="color:var(--texto-dim); margin-bottom:30px">Acesso Restrito - v2.2</p>
            <form id="form-login">
                <input type="email" id="email" class="auth-input" placeholder="Seu e-mail" required>
                <input type="password" id="pass" class="auth-input" placeholder="Sua senha" required>
                <div id="spinner" class="spinner"></div>
                <button type="submit" class="auth-btn" id="btn-entrar">ENTRAR NO SISTEMA</button>
                <div id="auth-error-box"></div>
            </form>
            <p style="color:var(--texto-dim); font-size:10px; margin-top:30px; opacity:0.6">Seus dados estão protegidos por RLS no Supabase.</p>
        </div>
    </div>

    <aside class="sidebar" id="app-sidebar" style="display:none">
        <div class="auth-logo" style="justify-content:flex-start; font-size:1.2rem; margin-bottom:32px"><i data-lucide="wallet"></i> FinanceFlow</div>
        <nav>
            <a class="nav-item active"><i data-lucide="layout-dashboard"></i> Dashboard</a>
            <a class="nav-item"><i data-lucide="arrow-left-right"></i> Transações</a>
            <a class="nav-item"><i data-lucide="credit-card"></i> Cartões</a>
        </nav>
        <div style="margin-top:auto">
            <div id="user-email" style="font-size:11px; margin-bottom:10px; opacity:0.6"></div>
            <button class="btn btn-s" id="btn-sair" style="width:100%"><i data-lucide="log-out"></i> SAIR</button>
        </div>
    </aside>

    <main class="main-wrapper" id="app-main">
        <header style="display:flex; justify-content:space-between; align-items:center">
            <div><h1>Dashboard</h1><p style="color:var(--texto-dim)">Seu capital sincronizado em nuvem.</p></div>
            <button class="btn btn-p" id="btn-add"><i data-lucide="plus"></i> NOVO</button>
        </header>
        <section class="summary-cards">
            <div class="card"><div>Receitas</div><div class="summary-value" id="tot-in" style="color:var(--verde)">R$ 0,00</div></div>
            <div class="card"><div>Despesas</div><div class="summary-value" id="tot-out" style="color:var(--vermelho)">R$ 0,00</div></div>
            <div class="card"><div>Saldo</div><div class="summary-value" id="tot-net">R$ 0,00</div></div>
        </section>
        <div class="card">
            <h3>Transações na Nuvem</h3>
            <div id="lista" style="margin-top:20px"></div>
        </div>
    </main>

    <script>
        const URL_SB = 'https://totqludytvydgqiwygqe.supabase.co';
        const KEY_SB = 'sb_publishable_8qkFVq7ZZyWRRLqtNLSdJg_-NlkJO9v';
        
        if (typeof supabase === 'undefined') {
            document.body.innerHTML = "<div style='padding:50px; text-align:center;'><h2>ERRO CRÍTICO</h2><p>Biblioteca Supabase não encontrada. Verifique sua conexão.</p></div>";
        }

        const sb = supabase.createClient(URL_SB, KEY_SB);

        const UI = {
            auth: document.getElementById('auth-section'),
            main: document.getElementById('app-main'),
            sidebar: document.getElementById('app-sidebar'),
            error: document.getElementById('auth-error-box'),
            spinner: document.getElementById('spinner'),
            form: document.getElementById('form-login'),
            btn: document.getElementById('btn-entrar')
        };

        async function verify() {
            const { data: { session } } = await sb.auth.getSession();
            updateUI(session?.user || null);
        }

        function updateUI(user) {
            if (user) {
                UI.auth.classList.add('hidden');
                UI.main.style.display = 'flex';
                UI.sidebar.style.display = 'flex';
                document.getElementById('user-email').innerText = user.email;
                fetchData();
            } else {
                UI.auth.classList.remove('hidden');
                UI.main.style.display = 'none';
                UI.sidebar.style.display = 'none';
            }
            lucide.createIcons();
        }

        UI.form.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;

            UI.error.style.display = 'none';
            UI.spinner.style.display = 'block';
            UI.btn.disabled = true;

            try {
                const { data, error } = await sb.auth.signInWithPassword({ email, password });
                if (error) {
                    console.error("Auth Fail:", error.message);
                    UI.error.innerHTML = `<strong>Erro no Login:</strong><br>${error.message === 'Invalid login credentials' ? 'Dados incorretos. Verifique e-mail e senha.' : error.message}`;
                    UI.error.style.display = 'block';
                    if(error.message.includes("confirmed")) {
                        UI.error.innerHTML += "<br><br><span style='font-size:11px'>DICA: Desative 'Confirm Email' nas configurações do Supabase.</span>";
                    }
                } else {
                    updateUI(data.user);
                }
            } catch (err) {
                UI.error.innerText = "Erro inesperado. Tente novamente.";
                UI.error.style.display = 'block';
            } finally {
                UI.spinner.style.display = 'none';
                UI.btn.disabled = false;
            }
        };

        document.getElementById('btn-sair').onclick = async () => {
            await sb.auth.signOut();
            updateUI(null);
        };

        async function fetchData() {
            const { data, error } = await sb.from('transactions').select('*').order('created_at', { ascending: false });
            if (!error) {
                const fmt = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
                const inc = data.filter(t => t.type === 'receita').reduce((s, x) => s + parseFloat(x.value), 0);
                const exp = data.filter(t => t.type === 'despesa').reduce((s, x) => s + parseFloat(x.value), 0);
                document.getElementById('tot-in').innerText = fmt(inc);
                document.getElementById('tot-out').innerText = fmt(exp);
                document.getElementById('tot-net').innerText = fmt(inc - exp);
                
                const list = document.getElementById('lista');
                list.innerHTML = data.length ? '' : '<p style="opacity:0.5; text-align:center">Nenhuma transação encontrada.</p>';
                data.forEach(t => {
                    const div = document.createElement('div');
                    div.className = 'transaction-item';
                    div.innerHTML = `
                        <div style="display:flex; gap:12px; align-items:center">
                            <div class="badge ${t.type === 'receita' ? 'bg-v' : 'bg-d'}">${t.type.toUpperCase()}</div>
                            <div><div>${t.description}</div><div style="font-size:11px; opacity:0.5">${t.category_id || 'Serviços'}</div></div>
                        </div>
                        <div style="font-weight:800; color:${t.type==='receita'?'var(--verde)':'var(--vermelho)'}">${fmt(t.value)}</div>
                    `;
                    list.appendChild(div);
                });
                lucide.createIcons();
            }
        }

        window.onload = () => {
            lucide.createIcons();
            verify();
        };
    </script>
</body>
</html>
